<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>

<style>
body{margin:0;font-family:Arial;background:#111;color:#fff;display:flex;flex-direction:column;height:100vh}
.header{background:#ff9800;color:#000;padding:12px;text-align:center}
#box{flex:1;overflow:auto;padding:10px;display:flex;flex-direction:column;gap:10px}
.msg{background:#222;padding:10px;border-radius:8px}
.me{background:#0d6efd}
input{padding:10px;flex:1}
button{padding:10px;border:none;background:#ff9800}
.input{display:flex;gap:8px;padding:10px;background:#1c1c1c}

img{max-width:200px;border-radius:8px}
</style>
</head>

<body>

<div class="header">ADMIN PANEL</div>
<div id="box"></div>

<div class="input">
<input id="text" placeholder="Reply...">
<button onclick="send()">Send</button>
</div>

<script type="module">

import {initializeApp} from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
import {getFirestore,collection,addDoc,query,orderBy,onSnapshot,serverTimestamp,updateDoc,doc}
from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyDh2fHMUbysckAxdIA8dcz8sHWrcLbW1EQ",
authDomain:"african-enterprise-challenge-f.firebaseapp.com",
projectId:"african-enterprise-challenge-f",
storageBucket:"african-enterprise-challenge-f.appspot.com",
messagingSenderId:"85146331644",
appId:"1:85146331644:web:b28599e0c8b75498fe6a79"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

window.send=async()=>{

let text=document.getElementById("text").value;

await addDoc(collection(db,"messages"),{
text,
email:"ADMIN",
name:"ADMIN",
unsentByUser:false,
unsentByAdmin:false,
time:serverTimestamp()
});

document.getElementById("text").value="";
};

function load(){
const q=query(collection(db,"messages"),orderBy("time"));

onSnapshot(q,snap=>{
let box=document.getElementById("box");
box.innerHTML="";

snap.forEach(d=>{
let m=d.data();
let div=document.createElement("div");
div.className="msg";

div.innerHTML=`
<b>${m.name}</b><br>
${m.unsentByAdmin ? "" : (m.text||"")}
${m.imageUrl ? `<br><img src="${m.imageUrl}">` : ""}
<br><button onclick="unsend('${d.id}')">Unsend</button>
`;

box.appendChild(div);
});
});
}

window.unsend=async(id)=>{
await updateDoc(doc(db,"messages",id),{
unsentByAdmin:true
});
}

load();

</script>

</body>
</html>

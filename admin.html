<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Chat</title>

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

.header{
background:#ff9800;
padding:15px;
text-align:center;
font-weight:bold;
}

#chatBox{
flex:1;
overflow-y:auto;
padding:10px;
display:flex;
flex-direction:column;
gap:10px;
}

.msg{
background:#222;
padding:10px;
border-radius:8px;
max-width:80%;
}

.me{
background:#0d6efd;
align-self:flex-end;
}

.inputBox{
display:flex;
padding:10px;
gap:10px;
background:#1c1c1c;
}

input{
flex:1;
padding:10px;
border:none;
border-radius:5px;
}

button{
padding:10px 15px;
border:none;
background:#ff9800;
color:black;
font-weight:bold;
border-radius:5px;
cursor:pointer;
}
</style>

</head>

<body>

<div class="header">
ADMIN CHAT PANEL
</div>

<div id="chatBox"></div>

<div class="inputBox">
<input id="msgInput" placeholder="Reply as admin...">
<button onclick="sendMsg()">Send</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-auth.js";
import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } 
from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDh2fHMUbysckAxdIA8dcz8sHWrcLbW1EQ",
authDomain: "african-enterprise-challenge-f.firebaseapp.com",
projectId: "african-enterprise-challenge-f",
storageBucket: "african-enterprise-challenge-f.firebasestorage.app",
messagingSenderId: "85146331644",
appId: "1:85146331644:web:b28599e0c8b75498fe6a79"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// admin login (simple)
signInAnonymously(auth);

let adminName = "ADMIN";

window.sendMsg = async function(){

const input = document.getElementById("msgInput");
if(input.value.trim()==="") return;

await addDoc(collection(db,"messages"),{
text: input.value,
email: adminName,
time: serverTimestamp()
});

input.value="";
};

function loadMessages(){

const q = query(collection(db,"messages"),orderBy("time"));

onSnapshot(q,(snapshot)=>{
const chatBox = document.getElementById("chatBox");
chatBox.innerHTML="";

snapshot.forEach(doc=>{
const data = doc.data();

const div = document.createElement("div");
div.classList.add("msg");

if(data.email === adminName){
div.classList.add("me");
}

div.innerHTML = `<b>${data.email}</b><br>${data.text}`;
chatBox.appendChild(div);
});

chatBox.scrollTop = chatBox.scrollHeight;
});

}

loadMessages();

</script>

</body>
</html>

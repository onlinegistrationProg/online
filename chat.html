<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Chat</title>

<style>
body{margin:0;font-family:Arial;background:#f2f2f2;height:100vh;display:flex;flex-direction:column}
.header{background:#007bff;color:#fff;padding:12px;text-align:center}
#box{flex:1;overflow:auto;padding:10px;display:flex;flex-direction:column;gap:10px}
.msg{background:#fff;padding:10px;border-radius:8px;max-width:75%}
.me{align-self:flex-end;background:#d1e7ff}
.input{display:flex;gap:8px;padding:10px;background:#fff}
input{flex:1;padding:10px}
button{padding:10px;border:none;background:#007bff;color:#fff}

img{max-width:200px;border-radius:8px;margin-top:5px}
</style>
</head>

<body>

<div class="header">Chat</div>
<div id="box"></div>

<div class="input">
<input id="text" placeholder="Message...">
<input type="file" id="img">
<button onclick="send()">Send</button>
</div>

<script type="module">
import {initializeApp} from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
import {getAuth,onAuthStateChanged} from "https://www.gstatic.com/firebasejs/12.2.1/firebase-auth.js";
import {getFirestore,collection,addDoc,query,orderBy,onSnapshot,serverTimestamp,updateDoc,doc} 
from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";
import {getStorage,ref,uploadBytes,getDownloadURL}
from "https://www.gstatic.com/firebasejs/12.2.1/firebase-storage.js";

const firebaseConfig={
apiKey:"AIzaSyDh2fHMUbysckAxdIA8dcz8sHWrcLbW1EQ",
authDomain:"african-enterprise-challenge-f.firebaseapp.com",
projectId:"african-enterprise-challenge-f",
storageBucket:"african-enterprise-challenge-f.appspot.com",
messagingSenderId:"85146331644",
appId:"1:85146331644:web:b28599e0c8b75498fe6a79"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);
const storage=getStorage(app);

let user;

onAuthStateChanged(auth,u=>{
if(!u) location.href="index.html";
user=u;
load();
});

window.send=async()=>{

let file=document.getElementById("img").files[0];
let text=document.getElementById("text").value;

let imageUrl="";

if(file){
let r=ref(storage,"images/"+Date.now());
await uploadBytes(r,file);
imageUrl=await getDownloadURL(r);
}

await addDoc(collection(db,"messages"),{
text,
imageUrl,
email:user.email,
name:user.email,
unsentByUser:false,
unsentByAdmin:false,
time:serverTimestamp()
});

document.getElementById("text").value="";
document.getElementById("img").value="";
};

function load(){
const q=query(collection(db,"messages"),orderBy("time"));

onSnapshot(q,snap=>{
let box=document.getElementById("box");
box.innerHTML="";

snap.forEach(d=>{
let m=d.data();

let div=document.createElement("div");
div.className="msg";
if(m.email==user.email) div.classList.add("me");

// USER UNSEND VIEW RULE
if(m.unsentByAdmin){
div.innerHTML="";
box.appendChild(div);
return;
}

let content=`<b>${m.name}</b><br>${m.text||""}`;

if(m.imageUrl){
content+=`<br><img src="${m.imageUrl}">`;
}

div.innerHTML=content;
box.appendChild(div);
});

box.scrollTop=box.scrollHeight;
});
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Chat</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.2);
width:90%;
max-width:350px;
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:5px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

#signupBtn{
background:#28a745;
color:white;
}

#loginBtn{
background:#007bff;
color:white;
}

#message{
margin-top:15px;
text-align:center;
font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<h2>Online Chat</h2>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button id="signupBtn">Create Account</button>

<button id="loginBtn">Log In</button>

<div id="message"></div>

</div>

</body>
</html>
